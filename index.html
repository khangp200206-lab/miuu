<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For Miuu 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
}

.container {
  margin-top: 80px;
  position: relative;
  z-index: 2;
}

h1 {
  color: white;
  font-size: 36px;
}

p {
  color: white;
  font-size: 18px;
}

/* gif */
.gif {
  width: 200px;
  border-radius: 20px;
  margin: 20px 0;
}

/* button */
button {
  padding: 12px 25px;
  margin: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

#yes {
  background: #ff4d6d;
  color: white;
}

#yes:hover {
  transform: scale(1.2);
}

#no {
  position: absolute;
  background: #ccc;
}

/* heart */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Miuu ơi cho anh xin lỗi nhóooo 😭</h1>
  <p>Miuu không chọn là tha lỗi cho anh đó 💔</p>

  <!-- GIF dễ thương -->
  <img class="gif" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">

  <br>

  <button id="yes">Em chấp nhận 💖</button>
  <button id="no">Không 😡</button>
</div>

<audio id="music" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const music = document.getElementById("music");

// nút chạy
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// tim bay
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

// click YES
yesBtn.addEventListener("click", () => {
  music.play();

  document.body.innerHTML = `
    <div style="margin-top:120px">
      <h1 style="color:white">Miuu dễ thương nhất 💖</h1>
      <p style="color:white;font-size:20px">
        Anh hứa sẽ không làm Miuu buồn nữa 😭
      </p>
      <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" 
           style="width:220px;border-radius:20px;margin-top:20px">
    </div>
  `;
});
</script>

</body>
</html>
